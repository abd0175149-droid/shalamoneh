<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="شلمونة — اطلب عصيرك المفضل أونلاين">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="شلمونة">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>شلمونة | Shalmoneh</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!-- Google Identity Services — يُحمّل قبل Flutter -->
  <script src="https://accounts.google.com/gsi/client"></script>

  <script>
    /**
     * startGoogleSignIn(onSuccess, onError)
     * يستدعى من Dart — يمرر callbacks كـ arguments
     * لا يستخدم eval أو jsify
     */
    function startGoogleSignIn(onSuccess, onError) {
      try {
        if (!window.google || !google.accounts || !google.accounts.id) {
          console.error('GIS not loaded');
          onError('gis_not_loaded');
          return;
        }

        google.accounts.id.initialize({
          client_id: '13399553146-5cj2lbtq691ompj8sejjfm4qk2eqk0t5.apps.googleusercontent.com',
          callback: function(response) {
            console.log('✅ GIS credential received');
            if (response && response.credential) {
              onSuccess(response.credential);
            } else {
              onError('no_credential');
            }
          },
          auto_select: false
        });

        google.accounts.id.prompt(function(notification) {
          if (notification.isNotDisplayed()) {
            var reason = notification.getNotDisplayedReason();
            console.warn('⚠️ One Tap not displayed:', reason);
            onError('not_displayed:' + reason);
          } else if (notification.isSkippedMoment()) {
            var reason = notification.getSkippedReason();
            console.warn('⚠️ One Tap skipped:', reason);
            onError('skipped:' + reason);
          } else {
            console.log('👁️ One Tap displayed, waiting for user...');
          }
        });
      } catch(e) {
        console.error('GIS error:', e);
        onError('exception:' + e.toString());
      }
    }
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
